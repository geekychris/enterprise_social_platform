server:
  port: 8080

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: worksphere
      auto-offset-reset: latest
  datasource:
    url: jdbc:postgresql://localhost:5432/social_enterprise
    username: social
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  graphql:
    graphiql:
      enabled: true
    path: /graphql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

social:
  jwt:
    secret: a-long-random-secret-key-for-development-only-change-in-production-please
    expiration-ms: 86400000
  auth:
    debug-bypass: true
  aoee:
    host: localhost
    port: 50051
    proxy-port: 8082
  opensearch:
    host: localhost
    port: 9200
  media:
    upload-dir: ./uploads
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      access-key: ${S3_ACCESS_KEY:admin}
      secret-key: ${S3_SECRET_KEY:password123}
      bucket: ${S3_BUCKET:media}
      region: ${S3_REGION:us-east-1}
  invite:
    expiry-hours: 168
    base-url: ${SOCIAL_INVITE_BASE_URL:}
  ai:
    ollama-url: ${SOCIAL_AI_OLLAMA_URL:http://localhost:11434}
    model: ${SOCIAL_AI_MODEL:llama3.2:latest}
  bot:
    user-id: ${SOCIAL_BOT_USER_ID:72057594037999999}
    name: ${SOCIAL_BOT_NAME:roid}
    max-context-tokens: ${SOCIAL_BOT_MAX_CONTEXT:3000}
    max-history-messages: ${SOCIAL_BOT_MAX_HISTORY:30}
    digest:
      enabled: ${SOCIAL_BOT_DIGEST_ENABLED:true}
      cron: ${SOCIAL_BOT_DIGEST_CRON:0 0 8 * * *}
      lookback-hours: ${SOCIAL_BOT_DIGEST_LOOKBACK:12}

worksphere:
  node-id: ${WORKSPHERE_NODE_ID:1}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  metrics:
    tags:
      application: worksphere
