server:
  port: ${WS_GATEWAY_PORT:8090}
  # Netty tuning for high connection count
  netty:
    connection-timeout: 30s
    idle-timeout: 3600s

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  codec:
    max-in-memory-size: 1MB

gateway:
  jwt:
    secret: ${SOCIAL_JWT_SECRET:a-long-random-secret-key-for-development-only-change-in-production-please}
  social-app:
    url: ${SOCIAL_APP_URL:http://localhost:8088}
  max-connections: ${WS_MAX_CONNECTIONS:100000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
