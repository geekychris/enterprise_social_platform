# WorkSphere Data Warehouse Stack
# Provides: MinIO, Hive Metastore (with its own Postgres), Spark Consumer
# Connects to the existing structured-logging_logging-network where Trino runs
#
# Usage:
#   docker compose -f docker-compose.data-warehouse.yml up -d
#
# Prerequisites:
#   - Kafka running on localhost:9092 (started via brew services)
#   - Trino already running on port 8081

services:
  minio:
    image: minio/minio:latest
    container_name: ws-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - ws-minio-data:/data
    networks:
      - structured-logging_logging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ws-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin password123;
      /usr/bin/mc mb myminio/warehouse || true;
      /usr/bin/mc mb myminio/worksphere || true;
      exit 0;
      "
    networks:
      - structured-logging_logging-network

  hive-postgres:
    image: postgres:15
    container_name: ws-hive-postgres
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
      - POSTGRES_DB=metastore
    ports:
      - "5433:5432"
    volumes:
      - ws-hive-postgres-data:/var/lib/postgresql/data
    networks:
      - structured-logging_logging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    build:
      context: ./docker/hive-metastore
      dockerfile: Dockerfile.hive-metastore
    container_name: ws-hive-metastore
    depends_on:
      hive-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://ws-hive-postgres:5432/metastore -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hivepassword
      - POSTGRES_HOST=ws-hive-postgres
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
      - HADOOP_CONF_DIR=/etc/hadoop/conf
    volumes:
      - ./docker/hive-metastore/hive-conf:/etc/hadoop/conf:ro
    ports:
      - "9083:9083"
    networks:
      - structured-logging_logging-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f HiveMetaStore || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  trino:
    image: trinodb/trino:latest
    container_name: ws-trino
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./docker/trino-catalog:/etc/trino/catalog:ro
      - ./docker/trino-config:/etc/trino:ro
    networks:
      - structured-logging_logging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-consumer:
    build:
      context: ./docker/spark-consumer
    container_name: ws-spark-consumer
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:29092
      - S3_ENDPOINT=http://ws-minio:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password123
      - HIVE_METASTORE_URI=thrift://ws-hive-metastore:9083
      - CONFIG_DIR=/opt/spark-apps/log-configs
      - CHECKPOINT_DIR=/opt/spark-data/checkpoints
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
    volumes:
      - ./log-configs:/opt/spark-apps/log-configs:ro
      - ws-spark-checkpoints:/opt/spark-data/checkpoints
    networks:
      - structured-logging_logging-network
    restart: on-failure

  airflow-postgres:
    image: postgres:15
    container_name: ws-airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - ws-airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - structured-logging_logging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: ws-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@ws-airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=worksphere
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --role Admin --username admin --password worksphere --email admin@worksphere.local --firstname Admin --lastname User || true
        # Create Trino connection
        airflow connections add trino_default --conn-type trino --host ws-trino --port 8080 --schema iceberg --login admin || true
    networks:
      - structured-logging_logging-network

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: ws-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["bash", "-c", "airflow webserver"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@ws-airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - AIRFLOW__WEBSERVER__SECRET_KEY=worksphere-airflow-secret
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    ports:
      - "8083:8080"
    networks:
      - structured-logging_logging-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: ws-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@ws-airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    networks:
      - structured-logging_logging-network
    restart: on-failure

volumes:
  ws-minio-data:
  ws-hive-postgres-data:
  ws-spark-checkpoints:
  ws-airflow-postgres-data:

networks:
  structured-logging_logging-network:
    external: true
