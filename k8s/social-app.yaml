apiVersion: v1
kind: PersistentVolume
metadata:
  name: uploads-pv
spec:
  capacity:
    storage: 20Gi
  # ReadWriteOnce: k3s/Rancher Desktop's local-path provisioner only supports RWO. Single pod
  # consumes uploads anyway, so RWO is sufficient. The PVC binds statically to this PV via the
  # empty storageClassName trick (skipping the dynamic local-path provisioner that can't fulfill).
  accessModes:
    - ReadWriteOnce
  hostPath:
    # Literal path — yaml doesn't expand env vars. Adjust if you want this elsewhere on the host.
    path: /tmp/worksphere/uploads
    type: DirectoryOrCreate
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: worksphere
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # Empty storageClassName + matching capacity/access binds to the static uploads-pv above and
  # bypasses the local-path provisioner (which would otherwise reject RWX).
  storageClassName: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-app
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-app
  template:
    metadata:
      labels:
        app: social-app
    spec:
      containers:
        - name: social-app
          image: docker.io/worksphere/social-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            # The image's application.yml defaults to server.port=8088. The k8s container/Service
            # are wired to 8080, so override here to keep the manifest's contract.
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/social_enterprise"
            - name: SPRING_DATASOURCE_USERNAME
              value: "social"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worksphere-secrets
                  key: postgres-password
            - name: SOCIAL_AOEE_HOST
              value: "aoee-proxy"
            - name: SOCIAL_AOEE_PROXY_PORT
              value: "8082"
            - name: SOCIAL_OPENSEARCH_HOST
              value: "opensearch"
            - name: SOCIAL_OPENSEARCH_PORT
              value: "9200"
            - name: SOCIAL_MEDIA_UPLOAD_DIR
              value: "/data/uploads"
            - name: SOCIAL_AUTH_DEBUG_BYPASS
              value: "true"
            - name: SOCIAL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: worksphere-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_SERVERS
              value: "kafka:9092"
            - name: SOCIAL_AI_OLLAMA_URL
              value: "http://ollama:11434"
            - name: SOCIAL_AI_MODEL
              value: "llama3.2:latest"
            - name: WORKSPHERE_NODE_ID
              value: "1"
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: social-app
  namespace: worksphere
spec:
  # NodePort so devportal's port registry can pin a stable host-accessible port (the renderer
  # patches spec.ports[].nodePort from the k8s-nodeport reservation matching this slot name).
  type: NodePort
  selector:
    app: social-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
