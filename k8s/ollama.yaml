apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "2Gi"
              # 250m so the pod schedules on small dev hosts (4-core mp4-style nodes
              # share that CPU with social-app/aoee/airflow/kafka/postgres which already
              # request ~3.6 cores). Limit stays at 4000m — ollama can still burst.
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: worksphere
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
