apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/worksphere/frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: worksphere
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: web
      port: 80
      targetPort: 80
      # Hard-pinned NodePort so the URL stays stable. Outside the devportal port-registry pool
      # (18000–18999 local, 30000–32767 nodeport — but the registry currently only tracks the
      # 'http' slot for this asset; this is a second exposure for the React UI).
      nodePort: 30080
