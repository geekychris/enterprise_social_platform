# MinIO (S3-compatible storage for Iceberg)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: minio-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: worksphere
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# Hive Metastore (catalog for Iceberg tables)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: hive-metastore
          image: apache/hive:4.0.0
          command: ["/opt/hive/bin/schematool", "-dbType", "derby", "-initSchema"]
          ports:
            - containerPort: 9083
          env:
            - name: SERVICE_NAME
              value: "metastore"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: worksphere
spec:
  selector:
    app: hive-metastore
  ports:
    - port: 9083
      targetPort: 9083
---
# Trino (SQL query engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: trinodb/trino:435
          ports:
            - containerPort: 8080
          env:
            - name: CATALOG_MANAGEMENT
              value: "static"
          volumeMounts:
            - name: trino-config
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: trino-config
          configMap:
            name: trino-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: worksphere
data:
  iceberg.properties: |
    connector.name=iceberg
    hive.metastore.uri=thrift://hive-metastore:9083
    iceberg.catalog.type=hive_metastore
    hive.s3.endpoint=http://minio:9000
    hive.s3.path-style-access=true
    hive.s3.aws-access-key=minioadmin
    hive.s3.aws-secret-key=minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: worksphere
spec:
  selector:
    app: trino
  ports:
    - port: 8080
      targetPort: 8080
---
# Spark Consumer (reads from Kafka, writes to Iceberg)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-consumer
  namespace: worksphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-consumer
  template:
    metadata:
      labels:
        app: spark-consumer
    spec:
      containers:
        - name: spark-consumer
          image: bitnami/spark:3.5
          command: ["/bin/bash", "-c", "echo 'Spark consumer placeholder - configure with structured-logger spark-consumer job'; sleep infinity"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: S3_ACCESS_KEY
              value: "minioadmin"
            - name: S3_SECRET_KEY
              value: "minioadmin"
            - name: HIVE_METASTORE_URI
              value: "thrift://hive-metastore:9083"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
