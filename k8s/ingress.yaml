apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worksphere-ingress
  namespace: worksphere
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "ws-gateway"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    # Sticky sessions for WebSocket gateway
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "ws-affinity"
    nginx.ingress.kubernetes.io/session-cookie-path: "/ws"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: social-app
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ws-gateway
                port:
                  number: 8090
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: social-app
                port:
                  number: 8080
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: social-app
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: social-app
                port:
                  number: 8080
