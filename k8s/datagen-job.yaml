apiVersion: batch/v1
kind: Job
metadata:
  name: datagen
  namespace: worksphere
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: datagen
    spec:
      restartPolicy: Never
      containers:
        - name: datagen
          image: docker.io/worksphere/datagen:latest
          imagePullPolicy: Never
          args:
            - "--spring.datasource.url=jdbc:postgresql://postgres:5432/social_enterprise"
            - "--spring.datasource.username=social"
            - "--spring.datasource.password=social_dev_password"
            - "--datagen.aoee.base-url=http://aoee-proxy:8081"
            # ${DATAGEN_MODE} placeholder didn't expand — kubectl doesn't substitute env in args.
            # HUNDREDS = ~100 users / posts / comments etc. (THOUSANDS for the bigger fixture).
            - "--mode=HUNDREDS"
            - "--aoee-sync=true"
