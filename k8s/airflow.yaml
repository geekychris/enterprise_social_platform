---
# ConfigMap for Airflow configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
data:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
  AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
  AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: "worksphere-airflow-secret"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

---
# Airflow Postgres - StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-postgres
spec:
  serviceName: airflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: airflow
            - name: POSTGRES_PASSWORD
              value: airflow
            - name: POSTGRES_DB
              value: airflow
          volumeMounts:
            - name: airflow-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "airflow"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "airflow"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: airflow-postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# Airflow Postgres Service
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
spec:
  selector:
    app: airflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None

---
# Airflow Webserver Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: airflow-init
          image: apache/airflow:2.9.0-python3.11
          command:
            - bash
            - -c
            - |
              pip install --no-cache-dir apache-airflow-providers-trino apache-airflow-providers-amazon trino
              airflow db migrate
              airflow users create --role Admin --username admin --password worksphere \
                --email admin@worksphere.local --firstname Admin --lastname User || true
              airflow connections add trino_default --conn-type trino --host trino \
                --port 8080 --schema iceberg --login admin || true
          envFrom:
            - configMapRef:
                name: airflow-config
      containers:
        - name: webserver
          image: apache/airflow:2.9.0-python3.11
          command:
            - bash
            - -c
            - |
              pip install --no-cache-dir apache-airflow-providers-trino apache-airflow-providers-amazon trino
              airflow webserver
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# Airflow Webserver Service
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080

---
# Airflow Scheduler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: apache/airflow:2.9.0-python3.11
          command:
            - bash
            - -c
            - |
              pip install --no-cache-dir apache-airflow-providers-trino apache-airflow-providers-amazon trino
              airflow scheduler
          envFrom:
            - configMapRef:
                name: airflow-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
